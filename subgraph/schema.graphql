type Market @entity(immutable: false) {
  id: ID!
  marketId: BigInt!
  externalMarketId: String!
  platform: String!
  question: String!
  category: String!
  resolutionSource: String!
  deadline: BigInt!
  createdAt: BigInt!
  status: String!
  creator: Bytes!
  liquidityHint: BigInt!
  impliedProbability: Int!
  marketType: String!
  marketUrl: String!
  metadataHash: Bytes!
}

type Receipt @entity(immutable: false) {
  id: ID!
  receiptId: BigInt!
  agentId: String!
  marketId: BigInt!
  signalHash: Bytes!
  reasoningHash: Bytes!
  integrityScore: Int!
  agentProbability: Int!
  marketProbability: Int!
  edgeBps: BigInt!
  suggestedUsdcAmount: BigInt!
  decision: String!
  lifecycleState: String!
  timestamp: BigInt!
  txHash: Bytes!
}
